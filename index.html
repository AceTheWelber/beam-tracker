<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beam Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🔩 Beam Tracker</h1>

<lab

<label>Beam Type</label>
<select id="beam">
<option value="0.0315">410-96</option>
<option value="0.0304">300-96</option>
</select>

<label>Number of Beams</label>
<input id="qty" type="number" value="0">

<label>Crew Size</label>
<input id="crew" type="number" value="2">

<h2>Add Ons</h2>

<label>
<input type="checkbox" id="setup" value="0.42">
Setup (+0.4200)
</label>

<label>
<input type="checkbox" id="wire" value="0.2298">
Wire Change (+0.2298)
</label>

<label>
<input type="checkbox" id="pallet" value="0.4098">
Pallet Stop Setup (+0.4098)
</label>

<button onclick="calculate()">Calculate</button>

<button onclick="saveJob()">Save Job</button>

<button onclick="showHistory()">Weekly History</button>

<button onclick="clearHistory()">Clear History</button>

<div class="result">

<h2>Results</h2>

<p>Total Piecework Hours:</p>
<h2 id="hours">0</h2>

<p>Hours Per Person:</p>
<h2 id="person">0</h2>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

<button onclick="addBeam()">+ Add Beam To Library</button>
